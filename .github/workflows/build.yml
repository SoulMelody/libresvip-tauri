name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build tauri package
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - { platform: windows-latest, args: "-b nsis" }
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: "latest"

      - name: Install Python dependencies
        run: |
          uv sync --group packaging

      - name: Build sidecar package
        shell: bash -el {0}
        run: |
          uv run pyinstaller libresvip_tauri.spec
          mv dist/libresvip-tauri-server/* ./frontend/src-tauri/

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          rust-src-dir: "frontend/src-tauri"

      - name: Install frontend dependencies
        shell: bash -el {0}
        run: |
          cd frontend
          bun install

      - name: Build tauri package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: libresvip-tauri-v__VERSION__
          releaseName: 'LibreSVIP Tauri v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: './frontend'
