name: Build

on:
  workflow_dispatch:
    inputs:
      linux-arm64:
        type: boolean
        default: false
      linux-x64:
        type: boolean
        default: false
      windows-arm64:
        type: boolean
        default: false
      windows-x64:
        type: boolean
        default: false
      windows-x86:
        type: boolean
        default: false
      macos-arm64:
        type: boolean
        default: false
      macos-x64:
        type: boolean
        default: false

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        shell: bash
        run: |
          matrix='{"include":[
            {"selection":"linux-arm64","platform":"ubuntu-24.04-arm","args":"-b appimage","target":"aarch64-unknown-linux-gnu","python_version":"","rust_log":"debug","verbose":""},
            {"selection":"linux-x64","platform":"ubuntu-latest","args":"-b appimage","target":"x86_64-unknown-linux-gnu","python_version":"","rust_log":"","verbose":""},
            {"selection":"windows-arm64","platform":"windows-11-arm","args":"-b nsis","target":"aarch64-pc-windows-msvc","python_version":"","rust_log":"","verbose":""},
            {"selection":"windows-x64","platform":"windows-latest","args":"-b nsis","target":"x86_64-pc-windows-msvc","python_version":"","rust_log":"","verbose":""},
            {"selection":"windows-x86","platform":"windows-latest","args":"-b nsis --target=i686-pc-windows-msvc","target":"i686-pc-windows-msvc","python_version":"cpython-3.14.4-windows-x86-none","rust_log":"","verbose":""},
            {"selection":"macos-arm64","platform":"macos-latest","args":"-b dmg --target aarch64-apple-darwin","target":"aarch64-apple-darwin","python_version":"cpython-3.14.4-macos-aarch64-none","rust_log":"","verbose":""},
            {"selection":"macos-x64","platform":"macos-latest","args":"-b dmg --target x86_64-apple-darwin","target":"x86_64-apple-darwin","python_version":"cpython-3.14.4-macos-x86_64-none","rust_log":"","verbose":""}
          ]}'
          selected="$(jq -c '[.inputs | to_entries[] | select((.value | tostring) == "true") | .key]' "$GITHUB_EVENT_PATH")"
          if [[ "$selected" != '[]' ]]; then
            matrix="$(jq -c --argjson selected "$selected" '.include |= map(select(.selection as $selection | $selected | index($selection)))' <<<"$matrix")"
          else
            matrix="$(jq -c . <<<"$matrix")"
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    name: Build tauri package
    needs: prepare-matrix
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            libwebkit2gtk-6.0-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            build-essential \
            file \
            wget \
            xdg-utils
      
      - name: Cache CEF (Linux only)
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        uses: actions/cache@v6
        with:
          path: ~/.cache/tauri-cef
          key: cef-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"
          python-version: ${{ matrix.python_version }}

      - name: Install Python dependencies
        run: uv sync --group packaging

      - name: Build sidecar package
        shell: bash -el {0}
        run: |
          uv run pyinstaller libresvip_tauri.spec
          cp dist/libresvip-tauri-server-* ./frontend/src-tauri/

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        shell: bash -el {0}
        working-directory: './frontend'
        run: bun install

      - name: Build tauri package
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUST_LOG: ${{ matrix.rust_log }}
          STRACE_MODE: ${{ matrix.selection == 'linux-arm64' && '0' || '' }}
        with:
          tagName: libresvip-tauri-v__VERSION__
          releaseName: 'LibreSVIP Tauri v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} ${{ matrix.verbose }}
          projectPath: './frontend'
