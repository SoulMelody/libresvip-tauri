name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build tauri package
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - { platform: windows-latest, args: "-b nsis", target: "x86_64-pc-windows-msvc", python_version: "" }
          - { platform: windows-11-arm, args: "-b nsis", target: "aarch64-pc-windows-msvc", python_version: "" }
          - { platform: windows-latest, args: "-b nsis --target=i686-pc-windows-msvc", target: "i686-pc-windows-msvc", python_version: "cpython-3.14.4-windows-x86-none" }
          - { platform: ubuntu-latest, args: "-b appimage", target: "x86_64-unknown-linux-gnu", python_version: "" }
          - { platform: ubuntu-24.04-arm, args: "-b appimage", target: "aarch64-unknown-linux-gnu", python_version: "" }
          - { platform: macos-latest, args: "-b dmg --target aarch64-apple-darwin", target: "aarch64-apple-darwin", python_version: "cpython-3.14.4-macos-aarch64-none" }
          - { platform: macos-latest, args: "-b dmg --target x86_64-apple-darwin", target: "x86_64-apple-darwin", python_version: "cpython-3.14.4-macos-x86_64-none" }
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            xdg-utils

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"
          python-version: ${{ matrix.python_version }}

      - name: Install Python dependencies
        run: uv sync --group packaging

      - name: Build sidecar package
        shell: bash -el {0}
        run: |
          uv run pyinstaller libresvip_tauri.spec
          mv dist/libresvip-tauri-server/* ./frontend/src-tauri/

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        shell: bash -el {0}
        working-directory: './frontend'
        run: bun install

      - name: Build tauri package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: libresvip-tauri-v__VERSION__
          releaseName: 'LibreSVIP Tauri v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: './frontend'
